<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto CSS Flexbox</title>
    <link rel="icon" type="img/png" href="gambar/wuwu.png" sizes="16x16"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .galeri {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .galeri-item {
            width: 100px;  
            height: 100px;
            background-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #388E3C;
            border-radius: 4px;
            overflow: hidden;
        }
        .galeri-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .galeri-item.no-img {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>
    <h2>Galeri Foto 18 Item (100px × 100px)</h2>
    <p style="text-align:center; margin-bottom:15px; font-size:13px; color:#555;">
    </p>

    <div class="galeri">
        <div class="galeri-item"><img src="gambar/image.png"  alt="Foto 1"  onerror="this.parentElement.innerHTML='Foto 1'"></div>
        <div class="galeri-item"><img src="gambar/image copy.png"  alt="Foto 2"  onerror="this.parentElement.innerHTML='Foto 2'"></div>
        <div class="galeri-item"><img src="gambar/image copy 2.png"  alt="Foto 3"  onerror="this.parentElement.innerHTML='Foto 3'"></div>
        <div class="galeri-item"><img src="gambar/image copy 3.png"  alt="Foto 4"  onerror="this.parentElement.innerHTML='Foto 4'"></div>
        <div class="galeri-item"><img src="gambar/image copy 4.png"  alt="Foto 5"  onerror="this.parentElement.innerHTML='Foto 5'"></div>
        <div class="galeri-item"><img src="gambar/image copy 5.png"  alt="Foto 6"  onerror="this.parentElement.innerHTML='Foto 6'"></div>
        <div class="galeri-item"><img src="gambar/image copy 6.png"  alt="Foto 7"  onerror="this.parentElement.innerHTML='Foto 7'"></div>
        <div class="galeri-item"><img src="gambar/image copy 7.png"  alt="Foto 8"  onerror="this.parentElement.innerHTML='Foto 8'"></div>
        <div class="galeri-item"><img src="gambar/image copy 8.png"  alt="Foto 9"  onerror="this.parentElement.innerHTML='Foto 9'"></div>
        <div class="galeri-item"><img src="gambar/image copy 9.png" alt="Foto 10" onerror="this.parentElement.innerHTML='Foto 10'"></div>
        <div class="galeri-item"><img src="gambar/image copy 10.png" alt="Foto 11" onerror="this.parentElement.innerHTML='Foto 11'"></div>
        <div class="galeri-item"><img src="gambar/image copy 11.png" alt="Foto 12" onerror="this.parentElement.innerHTML='Foto 12'"></div>
        <div class="galeri-item"><img src="gambar/image copy 12.png" alt="Foto 13" onerror="this.parentElement.innerHTML='Foto 13'"></div>
        <div class="galeri-item"><img src="gambar/image copy 13.png" alt="Foto 14" onerror="this.parentElement.innerHTML='Foto 14'"></div>
        <div class="galeri-item"><img src="gambar/image copy 14.png" alt="Foto 15" onerror="this.parentElement.innerHTML='Foto 15'"></div>
        <div class="galeri-item"><img src="gambar/image copy 15.png" alt="Foto 16" onerror="this.parentElement.innerHTML='Foto 16'"></div>
        <div class="galeri-item"><img src="gambar/image copy 16.png" alt="Foto 17" onerror="this.parentElement.innerHTML='Foto 17'"></div>
        <div class="galeri-item"><img src="gambar/image copy 17.png" alt="Foto 18" onerror="this.parentElement.innerHTML='Foto 18'"></div>
    </div>
</body>
</html>
