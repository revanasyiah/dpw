<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Progress</title>

<!--  jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!--  jQuery UI -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<style>
:root {
  --bg: #000;
  --card: #111;
  --border: #333;
  --accent: #e8ff5a;
  --accent2: #00ffff;
  --text: #fff;
  --muted: #aaa;
  --radius: 12px;
}

body {
  background: var(--bg);
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  color: var(--text);
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 600px;
  margin: auto;
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.card-num {
  width: 32px;
  height: 32px;
  background: var(--accent);
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-weight: bold;
}

.card-body {
  padding: 20px;
}

/* BUTTON */
button {
  padding: 10px 15px;
  border: none;
  background: var(--accent2);
  color: #000;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

/* PROGRESS BAR */
.progress-wrap {
  width: 100%;
  background: #222;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progress-bar {
  width: 0%;
  background: var(--accent2);
  color: #000;
  text-align: center;
  padding: 5px 0;
  font-size: 0.8rem;
}

/* STATUS */
#dl-status {
  font-size: 0.85rem;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="card">
  <div class="card-header">
    <div class="card-num">11</div>
    <h2>Download Dialog + Progressbar</h2>
  </div>

  <div class="card-body">
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px;">
      Simulasi download dengan progress bar
    </p>

    <button id="btnDownload">⬇ Mulai Download</button>

    <div id="download-dialog" title="Mengunduh File…" style="display:none;">
      <p>📄 <strong>laporan_praktikum.pdf</strong> (4.2 MB)</p>

      <div class="progress-wrap">
        <div class="progress-bar" id="dlBar">0%</div>
      </div>

      <div id="dl-status">Menunggu…</div>
    </div>
  </div>
</div>

<script>
$(document).ready(function(){

  $('#btnDownload').click(function(){

    // buka dialog
    $('#download-dialog').dialog({
      modal: true,
      width: 400
    });

    let progress = 0;

    const interval = setInterval(function(){
      progress += 5;

      $('#dlBar').css('width', progress + '%');
      $('#dlBar').text(progress + '%');

      $('#dl-status').text('Mengunduh... ' + progress + '%');

      if(progress >= 100){
        clearInterval(interval);
        $('#dl-status').text('✅ Download selesai!');
      }

    }, 200);

  });

});
</script>

</body>
</html>
